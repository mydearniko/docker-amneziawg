[Interface]
Address = INTERFACE_ADDRESS_PLACEHOLDER
ListenPort = SERVERPORT_PLACEHOLDER
PrivateKey = PRIVATEKEY_PLACEHOLDER
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth+ -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth+ -j MASQUERADE
# AmneziaWG Obfuscation Parameters
Jc = AWG_JC_PLACEHOLDER
Jmin = AWG_JMIN_PLACEHOLDER
Jmax = AWG_JMAX_PLACEHOLDER
S1 = AWG_S1_PLACEHOLDER
S2 = AWG_S2_PLACEHOLDER
S3 = AWG_S3_PLACEHOLDER
S4 = AWG_S4_PLACEHOLDER
H1 = AWG_H1_PLACEHOLDER
H2 = AWG_H2_PLACEHOLDER
H3 = AWG_H3_PLACEHOLDER
H4 = AWG_H4_PLACEHOLDER
# AWG 2.0 Signature Packets (optional, omit if empty)
# I1 = AWG_I1_PLACEHOLDER
# I2 = AWG_I2_PLACEHOLDER
# I3 = AWG_I3_PLACEHOLDER
# I4 = AWG_I4_PLACEHOLDER
